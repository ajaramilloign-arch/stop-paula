<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STOP Online</title>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-screen {
            display: none;
            text-align: center;
        }

        .login-screen.active {
            display: block;
        }

        .login-screen h2 {
            margin-bottom: 30px;
            color: #333;
        }

        .login-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .login-btn {
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .login-btn:active {
            transform: scale(0.95);
        }

        .btn-camilo {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-paula {
            background: linear-gradient(135deg, #f093fb, #d946a6);
            color: white;
        }

        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .player-info {
            font-size: 14px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .player-info.paula {
            color: #f093fb;
        }

        .title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .scores {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .score-box {
            background: #f5f7fa;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .score-box.paula {
            border-left-color: #f093fb;
        }

        .score-name {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .score-number {
            font-size: 26px;
            font-weight: 900;
            color: #667eea;
        }

        .score-box.paula .score-number {
            color: #f093fb;
        }

        .round-counter {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-bottom: 10px;
        }

        .timer-box {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe4b5 100%);
            border: 3px solid #ffa500;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }

        .timer-number {
            font-size: 48px;
            font-weight: 900;
            color: #ff6b6b;
        }

        .timer-label {
            font-size: 10px;
            color: #ff6b6b;
            font-weight: 600;
        }

        .status-box {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 11px;
            color: #2e7d32;
            font-weight: 600;
            text-align: center;
        }

        .input-box {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .input-label {
            font-size: 10px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: #f0f4ff;
        }

        input:disabled, select:disabled {
            background: #e8e8e8;
            cursor: not-allowed;
        }

        .opponent-status {
            background: #f5f7fa;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
            text-align: center;
            border: 2px solid #ddd;
            font-size: 11px;
            color: #666;
            font-weight: 600;
        }

        .opponent-status.answered {
            background: #d4edda;
            border-color: #4caf50;
            color: #155724;
        }

        .buttons {
            display: grid;
            gap: 8px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 100%;
            padding: 14px;
        }

        .btn-submit {
            background: #4caf50;
            color: white;
            width: 100%;
        }

        .btn-next {
            background: #2196f3;
            color: white;
            width: 100%;
        }

        .btn-logout {
            background: #999;
            color: white;
            font-size: 11px;
            padding: 10px;
            width: 100%;
            margin-top: 8px;
        }

        .hidden {
            display: none !important;
        }

        .results-box {
            display: none;
            background: #f5f7fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .results-box.active {
            display: block;
        }

        .results-title {
            font-size: 11px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .result-row {
            background: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
        }

        .result-label {
            color: #999;
            font-size: 9px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .result-content {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            align-items: center;
        }

        .result-answer {
            background: #f0f0f0;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
            min-height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        .result-answer.empty {
            color: #ccc;
            font-style: italic;
        }

        .result-points {
            background: #667eea;
            color: white;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            font-weight: 700;
            font-size: 12px;
        }

        .result-points.equal {
            background: #ffa500;
        }

        .result-points.zero {
            background: #ccc;
        }

        .final-screen {
            display: none;
        }

        .final-screen.active {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .final-title {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .final-scores {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .final-score {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 10px;
        }

        .final-score-name {
            font-size: 12px;
            margin-bottom: 5px;
        }

        .final-score-num {
            font-size: 32px;
            font-weight: 900;
        }

        .winner-text {
            font-size: 18px;
            font-weight: 900;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div class="login-screen active" id="loginScreen">
            <h2>¿Quién eres?</h2>
            <div class="login-buttons">
                <button class="login-btn btn-camilo" onclick="login('camilo')">👨 Camilo</button>
                <button class="login-btn btn-paula" onclick="login('paula')">👩 Paula</button>
            </div>
            <p style="margin-top: 20px; font-size: 12px; color: #999;">Selecciona tu nombre para comenzar</p>
        </div>

        <!-- Game Screen -->
        <div class="game-screen" id="gameScreen">
            <div class="header">
                <div class="player-info" id="playerInfo"></div>
                <div class="title">STOP</div>
            </div>

            <div class="scores">
                <div class="score-box">
                    <div class="score-name">Camilo</div>
                    <div class="score-number" id="camiloScore">0</div>
                </div>
                <div class="score-box paula">
                    <div class="score-name">Paula</div>
                    <div class="score-number" id="paulaScore">0</div>
                </div>
            </div>

            <div class="round-counter" id="roundCounter"></div>

            <div class="status-box" id="statusBox">Listo para jugar</div>

            <div class="timer-box">
                <div class="timer-number" id="timer">60</div>
                <div class="timer-label">Segundos</div>
            </div>

            <div class="input-box">
                <div class="form-group">
                    <label class="input-label">Categoría</label>
                    <select id="category">
                        <option value="animal">🐘 Animal</option>
                        <option value="country">🌍 País</option>
                        <option value="city">🏙️ Ciudad</option>
                        <option value="food">🍕 Comida</option>
                        <option value="color">🎨 Color</option>
                        <option value="name">👤 Nombre</option>
                        <option value="object">📦 Objeto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="input-label">Tu Respuesta</label>
                    <input type="text" id="answer" placeholder="Escribe tu palabra..." maxlength="30">
                </div>
            </div>

            <div class="opponent-status" id="opponentStatus">
                Esperando a Paula...
            </div>

            <div class="results-box" id="resultsBox">
                <div class="results-title">📊 Resultado</div>
                <div id="resultContent"></div>
            </div>

            <div class="buttons">
                <button class="btn-start" id="startBtn" onclick="startRound()">🎮 Iniciar Juego</button>
                <button class="btn-submit hidden" id="submitBtn" onclick="submitAnswer()">✅ Enviar Respuesta</button>
                <button class="btn-next hidden" id="nextBtn" onclick="nextRound()">▶️ Siguiente Ronda</button>
            </div>

            <div class="final-screen" id="finalScreen">
                <div class="final-title">🎉 FIN DEL JUEGO</div>
                <div class="final-scores">
                    <div class="final-score">
                        <div class="final-score-name">Camilo</div>
                        <div class="final-score-num" id="finalCamilo">0</div>
                    </div>
                    <div class="final-score">
                        <div class="final-score-name">Paula</div>
                        <div class="final-score-num" id="finalPaula">0</div>
                    </div>
                </div>
                <div class="winner-text" id="winner"></div>
                <button class="btn-start" onclick="resetGame()" style="background: rgba(255,255,255,0.3); border: 2px solid white; margin-top: 15px;">Jugar de Nuevo</button>
            </div>

            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAyiMq9WLipBPvX3pvqg_6X5l0iU-Xfnqc",
            authDomain: "stop-game-paula-camilo.firebaseapp.com",
            databaseURL: "https://stop-game-paula-camilo-default-rtdb.firebaseio.com",
            projectId: "stop-game-paula-camilo",
            storageBucket: "stop-game-paula-camilo.firebasestorage.app",
            messagingSenderId: "102567110915",
            appId: "1:102567110915:web:c5ceee423d4b336041fa45"
        };

        let db = null;
        let usingFirebase = false;

        // Intentar inicializar Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            usingFirebase = true;
            console.log('✓ Firebase inicializado correctamente');
        } catch (error) {
            console.log('⚠ Firebase no disponible, usando modo local');
            usingFirebase = false;
        }

        let currentPlayer = null;
        let gameState = {
            roundNumber: 0,
            timeLeft: 60,
            timerInterval: null,
            camiloScore: 0,
            paulaScore: 0,
            submitted: false
        };

        const categories = {
            animal: '🐘 Animal',
            country: '🌍 País',
            city: '🏙️ Ciudad',
            food: '🍕 Comida',
            color: '🎨 Color',
            name: '👤 Nombre',
            object: '📦 Objeto'
        };

        function login(player) {
            currentPlayer = player;
            const badge = document.getElementById('playerInfo');
            if (player === 'camilo') {
                badge.innerHTML = '👨 Eres Camilo';
                badge.classList.remove('paula');
            } else {
                badge.innerHTML = '👩 Eres Paula';
                badge.classList.add('paula');
            }

            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            document.getElementById('statusBox').textContent = '✓ Conectado';
        }

        function startRound() {
            if (gameState.roundNumber >= 5) {
                return;
            }

            gameState.roundNumber++;
            gameState.submitted = false;
            gameState.timeLeft = 60;

            document.getElementById('roundCounter').textContent = `Ronda ${gameState.roundNumber} de 5`;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('submitBtn').classList.remove('hidden');
            document.getElementById('category').disabled = false;
            document.getElementById('answer').disabled = false;
            document.getElementById('answer').value = '';
            document.getElementById('resultsBox').classList.remove('active');
            document.getElementById('opponentStatus').textContent = '⏳ Esperando a ' + (currentPlayer === 'camilo' ? 'Paula' : 'Camilo');

            document.getElementById('statusBox').textContent = '🎮 ¡Juego iniciado! Tienes 60 segundos';
            runTimer();
            document.getElementById('answer').focus();
        }

        function runTimer() {
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);

            gameState.timerInterval = setInterval(() => {
                gameState.timeLeft--;
                document.getElementById('timer').textContent = gameState.timeLeft;

                if (gameState.timeLeft <= 0) {
                    stopTimer();
                    if (!gameState.submitted) {
                        submitAnswer();
                    }
                }
            }, 1000);
        }

        function stopTimer() {
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
        }

        function submitAnswer() {
            stopTimer();
            gameState.submitted = true;

            const answer = document.getElementById('answer').value.trim().toLowerCase();
            const category = document.getElementById('category').value;

            document.getElementById('answer').disabled = true;
            document.getElementById('category').disabled = true;
            document.getElementById('submitBtn').classList.add('hidden');

            document.getElementById('statusBox').textContent = '⏳ Esperando a ' + (currentPlayer === 'camilo' ? 'Paula' : 'Camilo') + '...';

            // Simular respuesta del otro jugador después de 2 segundos
            setTimeout(() => {
                showResults(answer, category);
            }, 2000);
        }

        function showResults(myAnswer, category) {
            // Generar respuesta simulada del otro jugador
            const sampleAnswers = {
                animal: ['gato', 'perro', 'elefante', 'león', 'tigre'],
                country: ['españa', 'italia', 'brasil', 'india', 'japón'],
                city: ['madrid', 'roma', 'barcelona', 'parís', 'tokio'],
                food: ['pizza', 'manzana', 'pan', 'queso', 'chocolate'],
                color: ['rojo', 'azul', 'verde', 'amarillo', 'naranja'],
                name: ['juan', 'maría', 'carlos', 'ana', 'luis'],
                object: ['mesa', 'silla', 'libro', 'teléfono', 'lámpara']
            };

            // Chance 50/50 de que Paula tenga la misma respuesta
            const oppAnswer = Math.random() > 0.5 ? myAnswer : sampleAnswers[category][Math.floor(Math.random() * sampleAnswers[category].length)];

            let myPoints = 0;
            let oppPoints = 0;

            if (myAnswer && oppAnswer) {
                if (myAnswer === oppAnswer) {
                    myPoints = 50;
                    oppPoints = 50;
                } else {
                    myPoints = 100;
                    oppPoints = 100;
                }
            } else if (myAnswer) {
                myPoints = 100;
            } else if (oppAnswer) {
                oppPoints = 100;
            }

            gameState.camiloScore += currentPlayer === 'camilo' ? myPoints : oppPoints;
            gameState.paulaScore += currentPlayer === 'paula' ? myPoints : oppPoints;

            document.getElementById('camiloScore').textContent = gameState.camiloScore;
            document.getElementById('paulaScore').textContent = gameState.paulaScore;

            const resultHTML = `
                <div class="result-row">
                    <div class="result-label">${categories[category]}</div>
                    <div class="result-content">
                        <div class="result-answer">${myAnswer || '(vacío)'}</div>
                        <div class="result-answer">${oppAnswer || '(vacío)'}</div>
                        <div class="result-points ${myPoints === 0 ? 'zero' : myPoints === 50 ? 'equal' : ''}">${myPoints}</div>
                    </div>
                </div>
            `;

            document.getElementById('resultContent').innerHTML = resultHTML;
            document.getElementById('resultsBox').classList.add('active');
            document.getElementById('opponentStatus').textContent = '✅ ' + (currentPlayer === 'camilo' ? 'Paula' : 'Camilo') + ' respondió';
            document.getElementById('opponentStatus').classList.add('answered');

            document.getElementById('statusBox').textContent = `Ronda ${gameState.roundNumber} completada`;

            if (gameState.roundNumber >= 5) {
                setTimeout(showFinal, 2000);
            } else {
                document.getElementById('nextBtn').classList.remove('hidden');
            }
        }

        function nextRound() {
            document.getElementById('timer').textContent = '60';
            document.getElementById('answer').value = '';
            document.getElementById('answer').disabled = false;
            document.getElementById('category').disabled = false;
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('resultsBox').classList.remove('active');
            document.getElementById('opponentStatus').textContent = '⏳ Esperando a ' + (currentPlayer === 'camilo' ? 'Paula' : 'Camilo');
            document.getElementById('opponentStatus').classList.remove('answered');
        }

        function showFinal() {
            document.getElementById('finalCamilo').textContent = gameState.camiloScore;
            document.getElementById('finalPaula').textContent = gameState.paulaScore;

            let winner = '';
            if (gameState.camiloScore > gameState.paulaScore) {
                winner = '🏆 ¡Camilo Gana! 🏆';
            } else if (gameState.paulaScore > gameState.camiloScore) {
                winner = '🏆 ¡Paula Gana! 🏆';
            } else {
                winner = '🤝 ¡Empate! 🤝';
            }
            document.getElementById('winner').textContent = winner;
            document.getElementById('finalScreen').classList.add('active');
        }

        function resetGame() {
            gameState = {
                roundNumber: 0,
                timeLeft: 60,
                timerInterval: null,
                camiloScore: 0,
                paulaScore: 0,
                submitted: false
            };

            document.getElementById('timer').textContent = '60';
            document.getElementById('camiloScore').textContent = '0';
            document.getElementById('paulaScore').textContent = '0';
            document.getElementById('answer').value = '';
            document.getElementById('answer').disabled = false;
            document.getElementById('category').disabled = false;
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('resultsBox').classList.remove('active');
            document.getElementById('finalScreen').classList.remove('active');
            document.getElementById('roundCounter').textContent = '';
            document.getElementById('statusBox').textContent = '✓ Listo para jugar';
        }

        function logout() {
            stopTimer();
            currentPlayer = null;
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('loginScreen').classList.add('active');
            resetGame();
        }
    </script>
</body>
</html>
